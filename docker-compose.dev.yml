version: "3.8"

services:
  # Backend API - FamilyMeet (Development)
  Meet-Api:
    build:
      context: .
      dockerfile: src/api/Dockerfile
    container_name: meet-api-dev
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5000
      # Performance optimizations (disabled for development)
      DOTNET_gcServer: "false"
      DOTNET_gcConcurrent: "false"
      DOTNET_PROCESSOR_COUNT: "1"
      # Database configuration
      ConnectionStrings__DefaultConnection: Host=${POSTGRESDB_HOST:-host.docker.internal};Database=${POSTGRESDB_NAME:-FamilyChat_db};Username=${POSTGRESDB_USER:-postgres};Password=${POSTGRESDB_PASSWORD:-postgres};Port=${POSTGRESDB_PORT:-5432}
      # Redis configuration
      Redis__Host: ${REDIS_HOST:-host.docker.internal}
      Redis__Port: ${REDIS_PORT:-6379}
      Redis__Password: ${REDIS_PASSWORD:-}
      Redis__InstanceName: ${REDIS_INSTANCE_NAME:-FamilyMeet}
      # JWT configuration
      Jwt__Issuer: ${JWT_ISSUER:-FamilyMeet}
      Jwt__Audience: ${JWT_AUDIENCE:-FamilyMeetUsers}
      Jwt__Key: ${JWT_KEY:-FamilyMeetSecretKey123456789}
      Jwt__ExpirationMinutes: ${JWT_EXPIRATION_MINUTES:-60}
    ports:
      - "${API_PORT:-5000}:5000"
    volumes:
      - ./logs:/app/logs
      - ./src/api:/app/src  # Mount source for hot reload
    networks:
      - ${DOCKER_NETWORK_NAME:-familymeet-network}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: ${HEALTH_CHECK_INTERVAL:-30}s
      timeout: ${HEALTH_CHECK_TIMEOUT:-10}s
      retries: ${HEALTH_CHECK_RETRIES:-3}
      start_period: ${HEALTH_CHECK_START_PERIOD:-40}s
    deploy:
      resources:
        limits:
          memory: ${API_MEMORY_LIMIT:-1024}M
          cpus: "${API_CPU_LIMIT:-1}"
        reservations:
          memory: 512M
          cpus: "0.5"
    logging:
      driver: "json-file"
      options:
        max-size: "${LOG_MAX_SIZE:-10m}"
        max-file: "${LOG_MAX_FILE:-3}"

  # Frontend ClientWeb - Chat Simples (Development)
  Client-Web:
    build:
      context: ./src/clientWeb
      dockerfile: Dockerfile
    container_name: client-web-dev
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${CLIENTWEB_PORT:-4200}:80"
    volumes:
      - ./src/clientWeb/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./src/clientWeb:/app/src  # Mount source for hot reload
    networks:
      - ${DOCKER_NETWORK_NAME:-familymeet-network}
    depends_on:
      - Meet-Api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: ${HEALTH_CHECK_INTERVAL:-30}s
      timeout: ${HEALTH_CHECK_TIMEOUT:-10}s
      retries: ${HEALTH_CHECK_RETRIES:-3}
      start_period: ${HEALTH_CHECK_START_PERIOD:-40}s
    deploy:
      resources:
        limits:
          memory: ${CLIENTWEB_MEMORY_LIMIT:-256}M
          cpus: "${CLIENTWEB_CPU_LIMIT:-0.25}"
        reservations:
          memory: 128M
          cpus: "0.1"
    logging:
      driver: "json-file"
      options:
        max-size: "${LOG_MAX_SIZE:-10m}"
        max-file: "${LOG_MAX_FILE:-3}"

  # Frontend AdminWeb - Administração ABP (Development)
  Admin-Web:
    build:
      context: ./src/adminWeb/angular
      dockerfile: Dockerfile
    container_name: admin-web-dev
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${ADMINWEB_PORT:-4201}:80"
    volumes:
      - ./src/adminWeb/angular/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./src/adminWeb/angular:/app/src  # Mount source for hot reload
    networks:
      - ${DOCKER_NETWORK_NAME:-familymeet-network}
    depends_on:
      - Meet-Api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: ${HEALTH_CHECK_INTERVAL:-30}s
      timeout: ${HEALTH_CHECK_TIMEOUT:-10}s
      retries: ${HEALTH_CHECK_RETRIES:-3}
      start_period: ${HEALTH_CHECK_START_PERIOD:-40}s
    deploy:
      resources:
        limits:
          memory: ${ADMINWEB_MEMORY_LIMIT:-512}M
          cpus: "${ADMINWEB_CPU_LIMIT:-0.5}"
        reservations:
          memory: 256M
          cpus: "0.25"
    logging:
      driver: "json-file"
      options:
        max-size: "${LOG_MAX_SIZE:-10m}"
        max-file: "${LOG_MAX_FILE:-3}"

# Networks
networks:
  ${DOCKER_NETWORK_NAME:-familymeet-network}:
    driver: bridge
    ipam:
      config:
        - subnet: ${DOCKER_NETWORK_SUBNET:-172.20.0.0/16}
