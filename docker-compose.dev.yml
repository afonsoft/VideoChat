version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: familymeet-postgres
    environment:
      POSTGRES_DB: FamilyMeet
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./create-database.sql:/docker-entrypoint-initdb.d/01-create-database.sql
    networks:
      - familymeet-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d FamilyMeet"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: familymeet-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - familymeet-network
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ""
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API Backend (para desenvolvimento)
  api:
    build:
      context: ./src/api
      dockerfile: Dockerfile
    container_name: familymeet-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Default=Host=postgres;Port=5432;Database=FamilyMeet;Username=postgres;Password=postgres;
      - Redis__Configuration=redis:6379
    ports:
      - "5000:80"
      - "5001:443"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - familymeet-network
    restart: unless-stopped
    volumes:
      - ./src/api/src/afonsoft.FamilyMeet.HttpApi.Host/appsettings.Development.json:/app/appsettings.Development.json

  # Database Migrator
  dbmigrator:
    build:
      context: ./src/api
      dockerfile: Dockerfile
    container_name: familymeet-db-migrator
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Default=Host=postgres;Port=5432;Database=FamilyMeet;Username=postgres;Password=postgres;
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - familymeet-network
    command: ["dotnet", "afonsoft.FamilyMeet.DbMigrator.dll"]
    profiles:
      - migration

  # Admin Web Frontend
  adminweb:
    build:
      context: ./src/adminWeb
      dockerfile: Dockerfile
    container_name: familymeet-admin
    ports:
      - "4200:80"
    depends_on:
      - api
    networks:
      - familymeet-network
    restart: unless-stopped

  # Client Web Frontend
  clientweb:
    build:
      context: ./src/clientWeb
      dockerfile: Dockerfile.new
    container_name: familymeet-client
    ports:
      - "4201:80"
    depends_on:
      - api
    networks:
      - familymeet-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  familymeet-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
