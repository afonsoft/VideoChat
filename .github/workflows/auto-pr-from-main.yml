---
name: Auto-update Dependencies with Gemini

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  update-dependencies:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ALLHANDS_BOT_GITHUB_PAT }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm install -g @openhands/sdk

      - name: Check for Updates with Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.ALLHANDS_BOT_GITHUB_PAT }}
        run: |
          echo "Checking for dependency updates using Gemini AI..."
          
          openhands check-updates \
            --llm-model gemini/gemini-2.0-flash-exp \
            --github-token $GITHUB_TOKEN \
            --repo ${{ github.repository }} \
            --auto-approve true

      - name: Create Summary
        if: always()
        run: |
          echo "## Dependency Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**AI Model**: Gemini 2.0 Flash" >> $GITHUB_STEP_SUMMARY
          echo "**Schedule**: Daily at 2 AM UTC" >> $GITHUB_STEP_SUMMARY
          echo "**Date**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
