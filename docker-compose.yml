version: "3.8"

services:
  # Backend API - FamilyMeet
  Meet-Api:
    build:
      context: .
      dockerfile: src/api/Dockerfile
    container_name: meet-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5000
      # Performance optimizations
      DOTNET_gcServer: "true"
      DOTNET_gcConcurrent: "true"
      DOTNET_PROCESSOR_COUNT: "2"
      # Database configuration
      ConnectionStrings__DefaultConnection: Host=host.docker.internal;Database=FamilyChat_db;Username=postgres;Password=postgres
      Redis__Host: host.docker.internal
      Redis__Port: 6379
      Redis__Password:
      Redis__InstanceName: FamilyMeet
      Jwt__Issuer: FamilyMeet
      Jwt__Audience: FamilyMeetUsers
      Jwt__Key: FamilyMeetSecretKey123456789
      Jwt__ExpirationMinutes: 60
    ports:
      - "5000:5000"
    volumes:
      - ./logs:/app/logs
    networks:
      - familymeet-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: "1"
        reservations:
          memory: 512M
          cpus: "0.5"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Frontend ClientWeb - Chat Simples
  Client-Web:
    build:
      context: ./src/clientWeb
      dockerfile: Dockerfile
    container_name: client-web
    restart: unless-stopped
    ports:
      - "4200:80"
    volumes:
      - ./src/clientWeb/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - familymeet-network
    depends_on:
      - Meet-Api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
        reservations:
          memory: 128M
          cpus: "0.1"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Frontend AdminWeb - Administração ABP
  Admin-Web:
    build:
      context: ./src/adminWeb/angular
      dockerfile: Dockerfile
    container_name: admin-web
    restart: unless-stopped
    ports:
      - "4201:80"
    volumes:
      - ./src/adminWeb/angular/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - familymeet-network
    depends_on:
      - Meet-Api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M
          cpus: "0.25"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # PostgreSQL Database
  PostgreSQL:
    image: postgres:15-alpine
    container_name: postgres-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: FamilyChat_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d
    networks:
      - familymeet-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "0.5"
        reservations:
          memory: 512M
          cpus: "0.25"

  # Redis Cache
  Redis:
    image: redis:7-alpine
    container_name: redis-cache
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    environment:
      REDIS_PASSWORD: your_redis_password_here
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - familymeet-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
        reservations:
          memory: 128M
          cpus: "0.1"

# Networks
networks:
  familymeet-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# Volumes
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
