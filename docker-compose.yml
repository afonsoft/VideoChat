version: "3.8"

services:
  # Backend API - FamilyMeet
  Meet-Api:
    build:
      context: .
      dockerfile: src/api/Dockerfile
    container_name: meet-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5000
      # Performance optimizations
      DOTNET_gcServer: "true"
      DOTNET_gcConcurrent: "true"
      DOTNET_PROCESSOR_COUNT: "2"
      # Database configuration
      ConnectionStrings__DefaultConnection: Host=host.docker.internal;Database=FamilyChat_db;Username=postgres;Password=postgres
      Redis__Host: host.docker.internal
      Redis__Port: 6379
      Redis__Password:
      Redis__InstanceName: FamilyMeet
      Jwt__Issuer: FamilyMeet
      Jwt__Audience: FamilyMeetUsers
      Jwt__Key: FamilyMeetSecretKey123456789
      Jwt__ExpirationMinutes: 60
    ports:
      - "5000:5000"
    volumes:
      - ./logs:/app/logs
    networks:
      - familymeet-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: "1"
        reservations:
          memory: 512M
          cpus: "0.5"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Frontend - FamilyMeet Angular
  meet-frontend:
    build:
      dockerfile: .src/web/Dockerfile
    container_name: familymeet-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    networks:
      - familymeet-network
    depends_on:
      - meet-api
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
        reservations:
          memory: 128M
          cpus: "0.1"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  familymeet-network:
    driver: bridge
