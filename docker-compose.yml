version: "3.8"

services:
  # Backend API - FamilyMeet
  MeetApi:
    build:
      context: .
      dockerfile: src/api/Dockerfile
    container_name: meet-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5000
      # Performance optimizations
      DOTNET_gcServer: "true"
      DOTNET_gcConcurrent: "true"
      DOTNET_PROCESSOR_COUNT: "2"
      # Database configuration (host PostgreSQL)
      ConnectionStrings__DefaultConnection: Host=host.docker.internal;Database=FamilyChat_db;Username=postgres;Password=postgres;Port=5432
      # Redis configuration (host Redis)
      Redis__Host: host.docker.internal
      Redis__Port: 6379
      Redis__Password:
      Redis__InstanceName: FamilyMeet
      # JWT configuration
      Jwt__Issuer: FamilyMeet
      Jwt__Audience: FamilyMeetUsers
      Jwt__Key: FamilyMeetSecretKey123456789
      Jwt__ExpirationMinutes: 60
    ports:
      - "5000:5000"
    volumes:
      - ./logs:/app/logs
    networks:
      - familymeet-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: "1"
        reservations:
          memory: 512M
          cpus: "0.5"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Frontend ClientWeb - Chat Simples
  MeetClientWeb:
    build:
      context: ./src/clientWeb
      dockerfile: Dockerfile
    container_name: client-web
    restart: unless-stopped
    ports:
      - "4200:80"
    volumes:
      - ./src/clientWeb/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - familymeet-network
    depends_on:
      - Meet-Api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
        reservations:
          memory: 128M
          cpus: "0.1"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Frontend AdminWeb - Administração ABP
  MeetAdminWeb:
    build:
      context: ./src/adminWeb/angular
      dockerfile: Dockerfile
    container_name: admin-web
    restart: unless-stopped
    ports:
      - "4201:80"
    volumes:
      - ./src/adminWeb/angular/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - familymeet-network
    depends_on:
      - Meet-Api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M
          cpus: "0.25"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# Networks
networks:
  familymeet-network:
    driver: bridge
